name: CI

on:
  push:
    branches: [main, master, fpscanner-v2]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build (non-obfuscated)
        run: npm run build:dev
      
      - name: Build (obfuscated)
        run: npm run build:obfuscate
      
      - name: Verify dist files exist
        run: |
          test -f dist/fpScanner.es.js
          test -f dist/fpScanner.cjs.js
          test -f dist/index.d.ts

  test:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run Playwright tests
        run: npm run test:playwright
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  package:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for packaging
        run: npm run build:dev
      
      - name: Test npm pack
        run: |
          npm pack
          ls -la *.tgz
      
      - name: Test package installation
        run: |
          mkdir /tmp/test-install
          cd /tmp/test-install
          npm init -y
          npm install $GITHUB_WORKSPACE/fpscanner-*.tgz
          # Verify the package installed correctly
          test -f node_modules/fpscanner/dist/fpScanner.es.js
          test -f node_modules/fpscanner/bin/cli.js
